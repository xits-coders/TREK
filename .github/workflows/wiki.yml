name: Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'liketrek/TREK'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to GitHub wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v5
        with:
          strategy: clone
